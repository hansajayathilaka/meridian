# coturn config for Meridian (T05 — NAT traversal & relay policy).
# Ops guidance: ../../docs/operations/deployment.md §"TURN / coturn".
#
# TURN credentials are EPHEMERAL, per-session HMAC tokens minted by meridian-rendezvous — there are
# NO static per-user secrets here. coturn and the rendezvous share ONE secret (static-auth-secret ==
# rendezvous [turn].secret); coturn recomputes base64(HMAC-SHA1(secret, username)) over the
# username the client presents and admits the allocation only while now < the expiry embedded in
# that username. This is the "TURN REST API" (use-auth-secret) mechanism.

# --- Authentication (ephemeral shared-secret / REST mechanism) ---------------
use-auth-secret
# static-auth-secret is provisioned OUT OF BAND (env/file/secret manager) and MUST equal the
# rendezvous [turn].secret. NEVER commit the real value.
# static-auth-secret=<CHANGE_ME — provisioned out of band, never committed>
realm=<CHANGE_ME — org TURN realm, e.g. turn.chat.example>

# --- The candidate ladder: TURN/UDP, TURN/TCP, TURN/TLS-443 ------------------
# 3478 serves both UDP and TCP (system-design §5.4).
listening-port=3478
# TLS on 443 is the last-resort rung for hostile egress that only allows outbound HTTPS. coturn's
# default TLS port is 5349; we ALSO listen on 443 so clients behind "HTTPS-only" proxies can relay.
# (Run behind a proxy that already owns 443? Terminate TLS there and point clients at it instead.)
tls-listening-port=443
alt-tls-listening-port=5349
# TLS material for turns: (private CA in air-gapped deploys). Paths are illustrative.
# cert=/etc/coturn/certs/turn.crt
# pkey=/etc/coturn/certs/turn.key
# Modern TLS only.
no-tlsv1
no-tlsv1_1

# --- Relay behavior ----------------------------------------------------------
fingerprint
# Meridian relays DTLS/DTLS-SRTP ciphertext only — coturn meters bytes, never sees plaintext
# (anonymity-and-retention.md: "TURN relay learns ciphertext flow metadata, never content").
# no-multicast-peers and the deny list below keep the relay from being abused as an open proxy into
# internal networks.
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
# NOTE (air-gapped): an internal-only deployment relays between RFC-1918 peers, so the deny lines
# above are relaxed to the org's own ranges and external egress is disabled. See deployment.md §9.3.

# --- Capacity / anti-abuse (T14 tunes these; §9.1 sizing) --------------------
# total-quota=1200            # max simultaneous allocations (bandwidth-bound; TODO: confirm in T14)
# bps-capacity=0              # 0 = unlimited aggregate; set per bandwidth plan
# user-quota bounds how many concurrent allocations a SINGLE credential (username) can hold at once.
# A leaked/captured credential is still valid until its embedded expiry (§ use-auth-secret above), so
# this is what keeps that exposure bounded rather than unlimited: it does not reject reuse outright.
# 4 = one voice/video control-plane allocation for the current session plus headroom for a small
# number of concurrent P2P legs (e.g. a call plus a couple of relayed data channels), which covers the
# normal client shape without leaving room for a captured credential to fan out into many allocations.
user-quota=4

# --- Hardening ---------------------------------------------------------------
no-cli                        # disable the telnet admin interface
no-software-attribute         # do not advertise the coturn version
# stale-nonce                 # rotate nonces; on by default in recent coturn
# Prometheus exporter (allowlisted metrics only — meridian_turn_allocations_active / _bandwidth):
# prometheus
