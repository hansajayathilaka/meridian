# Meridian CI: lint (incl. invariants) -> test (incl. harnesses) -> build. Mirrors the `just` recipes.
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: Repo invariants (server-no-core, no-serde-on-blob, metrics-allowlist)
        run: |
          bash tools/lint-server-no-core.sh
          bash tools/lint-no-serde-on-blob.sh
          # Guards the guard: fails CI if a future edit to the lint silently regresses its
          # module-qualified-path / multi-line bypass coverage (F15).
          bash tools/lint-no-serde-on-blob.sh --selftest
          bash tools/lint-metrics-allowlist.sh
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test + adversarial harnesses
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace
      - name: Unit + integration tests
        run: cargo test --workspace
      - name: Adversarial harnesses
        run: |
          bash harnesses/opacity-audit/run.sh
          bash harnesses/mitm-sim/run.sh
          bash harnesses/ghost-device/run.sh
      - name: NAT matrix + relay policy (T05; netns rig skips without NET_ADMIN)
        run: bash harnesses/nat-matrix/run.sh
      # TODO: migrate to cargo nextest run --workspace
      - name: Conformance vectors (byte-identical across CLI/WASM/mobile) — docs/testing/strategy.md §1
        run: |
          cargo run -p xtask -- vectors
          git diff --exit-code -- test-vectors/ || {
            echo "::error::test-vectors/ drifted from the xtask generator — vectors are canonical, never hand-edited. Regenerate with 'cargo run -p xtask -- vectors' and commit the diff (a wire/derivation change needs architect + security-reviewer sign-off)." >&2
            exit 1
          }
          cargo test -p meridian-crypto --test conformance

  build:
    name: Build (release)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace --release

  supply-chain:
    name: License / advisory gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Enforces the vodozemac/no-AGPL decision (ADR 0011/0015) via deny.toml.
      - name: cargo-deny (licenses, advisories, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  docs:
    name: Docs (mermaid + links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install mermaid-cli
        run: npm i -g @mermaid-js/mermaid-cli
      - name: Validate docs (links + mermaid)
        run: bash tools/check-docs.sh
